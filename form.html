 <div class="form-container">
        <form id="investor-form" class="contact-form" method="POST" action="/api/send-email">
        <input id="name" name="name" type="text" type="text" placeholder="Your Name" required/>
        <input id="email" name="email" type="email" placeholder="Email Address" required/>
        <input id="phone" name="phone" type="tel" placeholder="Phone (optional)" />
        <textarea id="message" name="message" placeholder="Message" required></textarea>
        <button type="submit" class="btn">Send Message</button>
        </form>
        <div id="successMessage">
          <h2 class="section-title">Success</h2>
          <p>Thank you, we have received your details and will get back to you shortly.</p>
        </div>
</div>

<script>
document.getElementById('investor-form').addEventListener('submit', async function(event) {
  event.preventDefault(); // Prevent default form submission

  const formData = new FormData(this);
  const data = Object.fromEntries(formData);

  try {
    const response = await fetch('/api/send-email', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data),
    });

    if (response.ok) {
      document.getElementById('successMessage').style.display = 'flex'; // Show success message
      document.getElementById('investor-form').style.display = 'none';
      this.reset(); // Reset the form
    } else {
      throw new Error('Failed to send the message');
    }
  } catch (error) {
    console.error(error);
    alert('There was an error sending your message. Please try again.');
  }
});
</script>
